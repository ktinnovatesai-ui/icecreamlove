<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>A Little Question 🍦</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --glass-bg: rgba(255,255,255,0.35);
      --glass-border: rgba(255,255,255,0.6);
      --shadow: 0 8px 32px rgba(80, 120, 200, 0.18);
      --yes: #ff6b9d;
      --no: rgba(255,255,255,0.55);
      --text-main: #2d3a5e;
      --text-sub: #5a6a8a;
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      touch-action: manipulation;
      font-family: 'Poppins', sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 50%, #fbc2eb 100%);
      position: relative;
    }

    /* floating blobs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.45;
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 340px; height: 340px;
      background: radial-gradient(circle, #fbc2eb, #a1c4fd);
      top: -80px; left: -80px;
      animation: blobFloat 8s ease-in-out infinite alternate;
    }
    body::after {
      width: 280px; height: 280px;
      background: radial-gradient(circle, #c2e9fb, #ffecd2);
      bottom: -60px; right: -60px;
      animation: blobFloat 10s ease-in-out infinite alternate-reverse;
    }
    @keyframes blobFloat {
      0%   { transform: translate(0,0) scale(1); }
      100% { transform: translate(30px, 20px) scale(1.1); }
    }

    /* sprinkles */
    .sprinkle {
      position: fixed;
      border-radius: 999px;
      opacity: 0.55;
      pointer-events: none;
      z-index: 0;
      animation: sprinkleFloat linear infinite;
    }
    @keyframes sprinkleFloat {
      0%   { transform: translateY(0) rotate(0deg); opacity: 0.5; }
      100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
    }

    /* CARD */
    .card {
      position: relative;
      z-index: 10;
      background: var(--glass-bg);
      border: 1.5px solid var(--glass-border);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 28px;
      padding: 44px 36px 40px;
      max-width: 360px;
      width: calc(100vw - 40px);
      box-shadow: var(--shadow), 0 1px 0 rgba(255,255,255,0.8) inset;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      animation: cardIn 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: scale(0.8) translateY(30px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .emoji-top {
      font-size: 3.6rem;
      line-height: 1;
      margin-bottom: 18px;
      filter: drop-shadow(0 4px 12px rgba(255,100,150,0.25));
      animation: wobble 2.5s ease-in-out infinite;
    }
    @keyframes wobble {
      0%,100% { transform: rotate(-5deg) scale(1); }
      50%      { transform: rotate(5deg) scale(1.08); }
    }

    .question {
      font-size: 1.22rem;
      font-weight: 700;
      color: var(--text-main);
      text-align: center;
      line-height: 1.45;
      margin-bottom: 10px;
    }
    .sub {
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text-sub);
      text-align: center;
      margin-bottom: 32px;
    }

    /* BUTTONS */
    .btn-row {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      width: 100%;
    }

    .btn {
      border: none;
      outline: none;
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      border-radius: 999px;
      padding: 0 28px;
      height: 52px;
      font-size: 1rem;
      letter-spacing: 0.01em;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      -webkit-tap-highlight-color: transparent;
    }

    #btn-yes, #btn-no {
      background: linear-gradient(135deg, #ff6b9d, #ff8cc8);
      color: #fff;
      box-shadow: 0 6px 20px rgba(255,107,157,0.45), 0 1px 0 rgba(255,255,255,0.3) inset;
      width: 100%;
      max-width: 260px;
      transform-origin: center;
    }
    #btn-yes:hover, #btn-no:hover {
      box-shadow: 0 10px 28px rgba(255,107,157,0.55);
      filter: brightness(1.05);
    }
    #btn-yes:active, #btn-no:active {
      filter: brightness(0.95);
    }

    /* RESULT SCREENS */
    .result-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 0;
      animation: cardIn 0.65s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
    }
    .result-screen.active { display: flex; }

    .result-emoji {
      font-size: 3.8rem;
      margin-bottom: 16px;
      animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
    }
    @keyframes popIn {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    .result-title {
      font-size: 1.32rem;
      font-weight: 800;
      color: var(--text-main);
      text-align: center;
      line-height: 1.4;
      margin-bottom: 10px;
    }
    .result-sub {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-sub);
      text-align: center;
      margin-bottom: 22px;
    }

    /* GIF area */
    .gif-wrap {
      width: 100%;
      max-width: 260px;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(80,120,200,0.18);
      margin-bottom: 0;
      background: rgba(255,255,255,0.4);
      aspect-ratio: 1/1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .gif-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 18px;
      display: block;
    }

    /* confetti burst */
    .confetti-container {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 999;
      overflow: hidden;
    }
    .confetti-piece {
      position: absolute;
      width: 10px; height: 10px;
      border-radius: 2px;
      opacity: 0;
      animation: confettiFall 1.8s ease-in forwards;
    }
    @keyframes confettiFall {
      0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    /* hide card content when showing result */
    .card.result-mode .main-content { display: none; }
    .card.result-mode .result-screen { display: flex; }

  </style>
</head>
<body>

<!-- Sprinkles injected by JS -->
<div class="confetti-container" id="confetti"></div>

<div class="card" id="card">

  <!-- MAIN CONTENT -->
  <div class="main-content" id="mainContent" style="display:flex;flex-direction:column;align-items:center;width:100%;">
    <div class="emoji-top">🍦</div>
    <p class="question">Let's plan an ice cream date tonight at 9:30 PM?</p>
    <p class="sub">Just say yes. You know you want to. 👀</p>
    <div class="btn-row">
      <button class="btn" id="btn-yes" onclick="handleYes()">Yes, I'm in! 🍦</button>
      <button class="btn" id="btn-no" onclick="handleNo()">No / Not sure / idk</button>
    </div>
  </div>

  <!-- RESULT: Date confirmed (after No was clicked at least once then Yes) -->
  <div class="result-screen" id="screenDate">
    <div class="result-emoji">🎉</div>
    <p class="result-title">It's a date!<br>See you at 9:30 PM. ❤️</p>

    <div class="gif-wrap">
      <iframe src="https://giphy.com/embed/MDJ9IbxxvDUQM" frameborder="0" allowfullscreen style="width:100%;height:100%;border-radius:18px;"></iframe>
    </div>
  </div>

  <!-- RESULT: Roast (clicked Yes immediately) -->
  <div class="result-screen" id="screenRoast">
    <div class="result-emoji">🙄</div>
    <p class="result-title">I am not free like you,<br>please get a job.</p>

    <div class="gif-wrap">
      <iframe src="https://giphy.com/embed/3o7TKSjRrfIPjeiVyM" frameborder="0" allowfullscreen style="width:100%;height:100%;border-radius:18px;"></iframe>
    </div>
  </div>

</div>

<script>
  let noClicks = 0;
  let yesScale = 1;
  let done = false;

  // Generate floating sprinkles
  const colors = ['#ff6b9d','#ffd93d','#6bcbff','#a29bfe','#fd79a8','#55efc4'];
  const shapes = ['4px','50%'];
  for (let i = 0; i < 18; i++) {
    const el = document.createElement('div');
    el.className = 'sprinkle';
    const size = Math.random() * 10 + 6;
    el.style.cssText = `
      width:${size}px; height:${size * (Math.random() > 0.5 ? 2.5 : 1)}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      left:${Math.random()*100}vw;
      top:${Math.random()*100}vh;
      border-radius:${shapes[Math.floor(Math.random()*shapes.length)]};
      animation-duration:${6 + Math.random()*10}s;
      animation-delay:${Math.random()*6}s;
    `;
    document.body.appendChild(el);
  }

  function handleYes() {
    if (done) return;
    done = true;
    if (noClicks === 0) {
      showRoast();
    } else {
      showDate();
    }
  }

  function handleNo() {
    if (done) return;
    noClicks++;
    yesScale = Math.min(yesScale * 1.3, 5.5); // cap so it doesn't go infinite
    const btn = document.getElementById('btn-yes');
    btn.style.transform = `scale(${yesScale})`;
    btn.style.zIndex = '20';

    // also shrink the no button slightly for fun
    const noBtn = document.getElementById('btn-no');
    const noScale = Math.max(1 / (noClicks * 0.25 + 1), 0.35);
    noBtn.style.transform = `scale(${noScale})`;
    noBtn.style.opacity = Math.max(1 - noClicks * 0.15, 0.2);

    // change button label
    const labels = [
      "No / Not sure / idk",
      "Still no... 😶",
      "Hmm, maybe not?",
      "I said NO 🙅",
      "...okay fine maybe",
      "You can't make me!",
      "👀 no."
    ];
    noBtn.textContent = labels[Math.min(noClicks, labels.length - 1)];

    // pulse yes button
    btn.style.boxShadow = `0 0 0 ${Math.min(noClicks * 6, 30)}px rgba(255,107,157,0.15), 0 6px 20px rgba(255,107,157,0.45)`;
  }

  function showDate() {
    document.getElementById('mainContent').style.display = 'none';
    document.getElementById('screenRoast').style.display = 'none';
    document.getElementById('screenDate').style.display = 'flex';
    launchConfetti(['#ff6b9d','#ffd93d','#a29bfe','#6bcbff','#fd79a8']);
  }

  function showRoast() {
    document.getElementById('mainContent').style.display = 'none';
    document.getElementById('screenDate').style.display = 'none';
    document.getElementById('screenRoast').style.display = 'flex';
  }

  function launchConfetti(colors) {
    const container = document.getElementById('confetti');
    for (let i = 0; i < 60; i++) {
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      piece.style.cssText = `
        left: ${Math.random() * 100}%;
        top: ${Math.random() * -10}%;
        background: ${colors[Math.floor(Math.random()*colors.length)]};
        width: ${Math.random()*10+6}px;
        height: ${Math.random()*10+6}px;
        border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
        animation-delay: ${Math.random()*0.8}s;
        animation-duration: ${1.4 + Math.random()*1.2}s;
        transform: rotate(${Math.random()*360}deg);
      `;
      container.appendChild(piece);
    }
    setTimeout(() => container.innerHTML = '', 3500);
  }
</script>
</body>
</html>
